<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #eef1f6;
    }

    #canvas {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    #status {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 1000;
      background: rgba(255,255,255,0.92);
      border: 1px solid #d7dce5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #2c3e50;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    #legend {
      position: absolute;
      bottom: 18px;
      right: 18px;
      z-index: 1000;
      background: rgba(255,255,255,0.92);
      border: 1px solid #d7dce5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #2c3e50;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }

    .node-shadow {
      fill: rgba(0,0,0,0.10);
      rx: 14;
      ry: 14;
    }

    .node-body {
      fill: #fff9cc;
      stroke: #6c63ff;
      stroke-width: 2;
      rx: 14;
      ry: 14;
    }

    .node-header {
      fill: #ede4ff;
      stroke: #6c63ff;
      stroke-width: 2;
      rx: 14;
      ry: 14;
    }

    .node-title {
      font-size: 15px;
      font-weight: 700;
      fill: #2f2f44;
    }

    .node-divider {
      stroke: #cfc5ff;
      stroke-width: 1.5;
    }

    .node-text {
      font-size: 12px;
      fill: #4c5670;
    }

    .edge {
      stroke-width: 2.4;
      fill: none;
    }

    .edge-label {
      font-size: 11px;
      fill: #374151;
      font-weight: 700;
    }

    /* ── Phase 4: Reply threads ───────────────────────── */
    .reply-thread {
      margin-top: 10px;
      margin-left: 12px;
      border-left: 3px solid #e0d8ff;
      padding-left: 10px;
    }

	.reply-row {
	  margin-bottom: 8px;
	  padding: 6px 8px 6px 10px;
	  background: #f9f7ff;
	  border-left: 3px solid #c4b8ff;
	  border-radius: 6px;
	  font-size: 12px;
	}

    .reply-meta {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 3px;
    }

    .reply-deleted {
      color: #9ca3af;
      font-style: italic;
      font-size: 12px;
    }

    .reply-input-area {
      margin-top: 10px;
      margin-left: 12px;
      border-left: 3px solid #c4b8ff;
      padding-left: 10px;
    }

    .reply-textarea {
      width: 100%;
      min-height: 60px;
      resize: vertical;
      font-family: Arial, sans-serif;
      font-size: 12px;
      padding: 6px 8px;
      border: 1px solid #d5dbe3;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .note-delete-btn {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      margin-right: 6px;
      font-size: 11px;
      padding: 4px 10px;
    }

    .note-reply-btn {
      background: #ede9fe;
      color: #5b21b6;
      border: 1px solid #c4b5fd;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      font-size: 11px;
      padding: 4px 10px;
    }

    .reply-delete-btn {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      padding: 2px 6px;
      margin-top: 4px;
    }

    .note-ghosted .node-body {
      stroke-dasharray: 6 4;
      fill: #f5f5f5;
      stroke: #999;
    }

    .contextMenu {
      background-color: #ffffff;
      border: 1px solid #cccccc;
      box-shadow: 1px 1px 10px rgba(0, 0, 0, 0.1);
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 200px;
      z-index: 2000;
      border-radius: 8px;
      overflow: hidden;
    }

    .contextMenuItem {
      cursor: pointer;
      padding: 10px 14px;
      background-color: #f8f8f8;
      font-size: 14px;
    }

    .contextMenuItem:hover {
      background-color: #ececec;
    }

    .noteDialog {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 320px;
      background: rgb(255, 255, 255);
      border: 1px solid #cfd6e0;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
      z-index: 2500;
      padding: 14px;
    }

    .noteDialogTitle {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #2f2f44;
    }

    .noteDialogMeta {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .noteInput {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 10px;
      border: 1px solid #d5dbe3;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }

    .noteDialogActions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .noteBtn {
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
    }

    .noteBtnCancel {
      background: #eceff3;
      color: #374151;
    }

    .noteBtnSave {
      background: #6c63ff;
      color: white;
    }

    .noteBtn:hover {
      opacity: 0.92;
    }

    .note-badge {
      fill: #6c63ff;
      stroke: #ffffff;
      stroke-width: 2;
      cursor: pointer;
    }

    .note-badge-text {
      fill: white;
      font-size: 11px;
      font-weight: 700;
      pointer-events: auto;
      cursor: pointer;
      text-anchor: middle;
      dominant-baseline: central;
    }
	
	.association-note-badge {
	  fill: #ffd6dc;
	  stroke: #d7263d;
	  stroke-width: 1.5;
	  cursor: pointer;
	}

	.association-note-badge-text {
	  fill: #d7263d;
	  font-size: 11px;
	  font-weight: 700;
	  pointer-events: auto;
	  cursor: pointer;
	  text-anchor: middle;
	  dominant-baseline: central;
	}

	.edge-hitbox {
	  stroke: transparent;
	  stroke-width: 16;
	  fill: none;
	  cursor: context-menu;
	}

	.floating-note-panel {
	  position: absolute;
	  width: 260px;
	  min-height: 140px;
	  background: #fffef7;
	  border: 1px solid #ddd3aa;
	  border-radius: 14px;
	  box-shadow: 0 10px 26px rgba(0,0,0,0.16);
	  z-index: 2600;
	  overflow: hidden;
	}

	.floating-note-header {
	  background: linear-gradient(to bottom, #f6e9aa, #f1e19a);
	  padding: 12px 14px;
	  cursor: move;
	  display: flex;
	  justify-content: space-between;
	  align-items: center;
	  font-weight: 700;
	  font-size: 15px;
	  color: #4a4330;
	  border-bottom: 1px solid #ddd2a7;
	  user-select: none;
	}

	.floating-note-close {
	  border: none;
	  background: transparent;
	  font-size: 17px;
	  font-weight: 700;
	  line-height: 1;
	  cursor: pointer;
	  color: #6b5f3a;
	  padding: 2px 6px;
	  border-radius: 6px;
	  transition: background 0.18s ease, color 0.18s ease;
	}

	.floating-note-close:hover {
	  background: rgba(0,0,0,0.08);
	  color: #2f2f44;
	}

	.floating-note-body {
	  padding: 14px 14px 12px 14px;
	  font-size: 13px;
	  color: #374151;
	  white-space: pre-wrap;
	  line-height: 1.45;
	}

	.floating-note-meta {
	  margin-top: 12px;
	  font-size: 11px;
	  color: #6b7280;
	  border-top: 1px dashed #d7cfa9;
	  padding-top: 10px;
	  line-height: 1.5;
	}

	.note-panel-toolbar {
	  display: flex;
	  justify-content: space-between;
	  align-items: center;
	  gap: 8px;
	  margin-bottom: 12px;
	}

	.note-panel-counter {
	  font-size: 11px;
	  color: #8a8f9b;
	  font-weight: 600;
	  letter-spacing: 0.2px;
	}

	.note-panel-nav {
	  display: flex;
	  gap: 6px;
	}

	.note-panel-nav-btn {
	  border: 1px solid #cfc5ff;
	  background: #f4f1ff;
	  color: #4b3fb5;
	  border-radius: 7px;
	  padding: 5px 10px;
	  cursor: pointer;
	  font-size: 12px;
	  font-weight: 600;
	  transition: background 0.18s ease, border-color 0.18s ease, transform 0.12s ease;
	}

	.note-panel-nav-btn:hover:not(:disabled) {
	  background: #e9e3ff;
	  border-color: #b8abff;
	}

	.note-panel-nav-btn:active:not(:disabled) {
	  transform: translateY(1px);
	}

	.note-panel-nav-btn:disabled {
	  opacity: 0.42;
	  cursor: default;
	  background: #f5f5f5;
	  color: #8b8b8b;
	  border-color: #dddddd;
	}
  </style>
</head>
<body>
  <div class="contextMenu" id="contextMenu">
    <div class="contextMenuItem" id="addNoteMenuItem">Add Note</div>
  </div>

  <div class="noteDialog" id="noteDialog">
    <div class="noteDialogTitle">Create Note</div>
    <div class="noteDialogMeta" id="noteDialogMeta"></div>
    <textarea
      id="noteInput"
      class="noteInput"
      placeholder="Enter note content here..."
    ></textarea>
    <div class="noteDialogActions">
      <button class="noteBtn noteBtnCancel" id="cancelNoteBtn" type="button">Cancel</button>
      <button class="noteBtn noteBtnSave" id="saveNoteBtn" type="button">Save</button>
    </div>
  </div>

  <div id="canvas">
    <div id="status">Rendered successfully. Drag nodes. Ctrl + wheel zoom.</div>

    <div id="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#E8E4F0;border:1px solid #ccc"></div><span style="color:#2A2040">Class</span></div>
      <div class="legend-item"><div class="legend-swatch" style="background:#FFDAB9;border:1px solid #ccc"></div><span style="color:#3A2A0A">Abstract Class</span></div>
      <div class="legend-item"><div class="legend-swatch" style="background:#87CEEB;border:1px solid #ccc"></div><span style="color:#1A1A2E">Interface</span></div>
      <div class="legend-item"><div class="legend-swatch" style="background:#4A2E6B"></div><span style="color:#4A2E6B">Enumeration</span></div>
    </div>

    <svg id="svg" viewBox="0 0 2400 1600">
      <defs>
        <marker id="arrow-solid" markerWidth="14" markerHeight="14" refX="11" refY="6" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M0,0 L0,12 L12,6 z" fill="#586070"></path>
        </marker>

        <marker id="arrow-open" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M2,2 L14,8 L2,14" fill="none" stroke="#586070" stroke-width="2"></path>
        </marker>

        <marker id="diamond-solid" markerWidth="18" markerHeight="18" refX="9" refY="9" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M9,1 L17,9 L9,17 L1,9 Z" fill="#586070" stroke="#586070"></path>
        </marker>

        <marker id="diamond-hollow" markerWidth="18" markerHeight="18" refX="9" refY="9" orient="auto" markerUnits="userSpaceOnUse">
          <path d="M9,1 L17,9 L9,17 L1,9 Z" fill="white" stroke="#586070" stroke-width="2"></path>
        </marker>
      </defs>
      <g id="viewport"></g>
    </svg>
  </div>

  <script>
    let currentZoom = 1.0;
    let currentAuthor = "Unknown Author";

    let activeNodeId = null;
    let noteDialogAnchor = { x: 0, y: 0 };

	const notesByNode = {};
	const savedPositionsByNode = {};
	const panelPositionsByNode = {};
	const openPanelsByNode = {};
	const nodeAnchors = {};

    let lastRenderedGraph = null;
	
	const GENERAL_NOTE_ID = "General Notes";
	
	function createGeneralNoteId() {
	  return GENERAL_NOTE_ID + "::" + generateId();
	}

	function isGeneralNoteId(id) {
	  return id === GENERAL_NOTE_ID || String(id || '').startsWith(GENERAL_NOTE_ID + "::");
	}
	
	function isEdgeNoteId(id) {
	  return String(id || '').startsWith('edge::');
	}

	function displayNameForComponent(id) {
	  if (isGeneralNoteId(id)) return 'General Notes';
	  if (isEdgeNoteId(id)) return 'Association Note';
	  return id;
	}

    const customMenu = document.getElementById('contextMenu');
    const addNoteMenuItem = document.getElementById('addNoteMenuItem');

    const noteDialog = document.getElementById('noteDialog');
    const noteInput = document.getElementById('noteInput');
    const noteDialogMeta = document.getElementById('noteDialogMeta');
    const saveNoteBtn = document.getElementById('saveNoteBtn');
    const cancelNoteBtn = document.getElementById('cancelNoteBtn');

    function setCurrentAuthor(name) {
      currentAuthor = name && name.trim() ? name.trim() : "Unknown Author";
    }

    function setCurrentUser(name) {
      setCurrentAuthor(name);
    }

    function addNoteBadge(nodeId) {
      const nodeEl = document.querySelector('.node[data-id="' + nodeId + '"]');
      if (!nodeEl) return;

      if (nodeEl.querySelector('.note-badge-icon')) return;

      const bodyRect = nodeEl.querySelector('.node-body');
      const nodeWidth = bodyRect ? parseFloat(bodyRect.getAttribute('width')) : 280;

      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'note-badge-icon');
      g.setAttribute('transform', 'translate(' + (nodeWidth - 10) + ', -10)');
      g.style.cursor = 'pointer';

      // Speech bubble path (20 wide x 18 tall, tail at bottom-left)
      const bubble = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      bubble.setAttribute('d', 'M 0,13 L 0,3 Q 0,0 3,0 L 17,0 Q 20,0 20,3 L 20,11 Q 20,14 17,14 L 8,14 L 4,18 L 5,14 L 3,14 Q 0,14 0,11 Z');
      bubble.setAttribute('fill', '#6c63ff');
      bubble.setAttribute('stroke', '#ffffff');
      bubble.setAttribute('stroke-width', '1.5');
      bubble.setAttribute('stroke-linejoin', 'round');

      g.appendChild(bubble);
      g.addEventListener('click', function(event) {
        event.stopPropagation();
        openNotePanel(nodeId);
      });

      nodeEl.appendChild(g);
    }

    function removeNoteBadge(nodeId) {
      const nodeEl = document.querySelector('.node[data-id="' + nodeId + '"]');
      if (!nodeEl) return;
      const badge = nodeEl.querySelector('.note-badge-icon');
      if (badge) badge.remove();
    }

    function setStatus(msg) {
      document.getElementById('status').innerText = msg;
    }

    function setZoom(scale) {
      currentZoom = scale;
      const viewport = document.getElementById('viewport');
      const panX = viewport.dataset.panX ? parseFloat(viewport.dataset.panX) : 0;
      const panY = viewport.dataset.panY ? parseFloat(viewport.dataset.panY) : 0;
      viewport.setAttribute('transform', 'translate(' + panX + ',' + panY + ') scale(' + currentZoom + ')');
    }

    function setBackground(color) {
      document.body.style.background = color;
      var canvas = document.getElementById('canvas');
      if (canvas) canvas.style.background = color;
    }

    function showContextMenu(x, y, nodeId) {
      activeNodeId = nodeId;
      noteDialogAnchor = { x, y };
      hideNoteDialog();

      customMenu.style.display = "block";
      customMenu.style.top = y + "px";
      customMenu.style.left = x + "px";
    }

    function hideContextMenu() {
      customMenu.style.display = "none";
    }

    function showNoteDialog() {
      if (!activeNodeId) return;

      hideContextMenu();

	  noteDialogMeta.textContent = "Component: " + displayNameForComponent(activeNodeId) + " | Author: " + currentAuthor;
      noteInput.value = "";

	  const anchor = isGeneralNoteId(activeNodeId)
	    ? getClampedPosition(noteDialogAnchor.x + 8, noteDialogAnchor.y + 8)
	    : getDefaultPanelPosition(activeNodeId);
      noteDialog.style.display = "block";
      noteDialog.style.top = anchor.y + "px";
      noteDialog.style.left = anchor.x + "px";

      noteInput.focus();
    }

    function hideNoteDialog() {
      noteDialog.style.display = "none";
    }
	
	function screenToSvgPoint(clientX, clientY) {
	  const svg = document.getElementById('svg');
	  const pt = svg.createSVGPoint();

	  pt.x = clientX;
	  pt.y = clientY;

	  const svgPoint = pt.matrixTransform(svg.getScreenCTM().inverse());

	  const viewport = document.getElementById('viewport');
	  const panX = viewport.dataset.panX ? parseFloat(viewport.dataset.panX) : 0;
	  const panY = viewport.dataset.panY ? parseFloat(viewport.dataset.panY) : 0;

	  return {
	    x: (svgPoint.x - panX) / currentZoom,
	    y: (svgPoint.y - panY) / currentZoom
	  };
	}
	
	function getClampedPosition(x, y) {
	  const canvas = document.getElementById("canvas");
	  const rect = canvas.getBoundingClientRect();

	  const panelWidth = 280;
	  const panelHeight = 220;

	  return {
	    x: Math.max(8, Math.min(x, rect.width - panelWidth - 8)),
	    y: Math.max(8, Math.min(y, rect.height - panelHeight - 8))
	  };
	}

	function getDefaultPanelPosition(nodeId) {
	  const canvas = document.getElementById("canvas");
	  const rect = canvas.getBoundingClientRect();

	  let pos;

	  if (panelPositionsByNode[nodeId]) {
	    pos = panelPositionsByNode[nodeId];
	  } else if (nodeAnchors[nodeId]) {
	    pos = {
	      x: nodeAnchors[nodeId].x + 24,
	      y: nodeAnchors[nodeId].y + 24
	    };
	  } else {
	    pos = {
	      x: noteDialogAnchor.x + 8,
	      y: noteDialogAnchor.y + 8
	    };
	  }

	  const panelWidth = 280;
	  const panelHeight = 220;

	  return {
	    x: Math.max(8, Math.min(pos.x, rect.width - panelWidth - 8)),
	    y: Math.max(8, Math.min(pos.y, rect.height - panelHeight - 8))
	  };
	}

    // ── Phase 4 + 5 helpers ───────────────────────────────────────

    function generateId() {
      return Math.random().toString(36).substr(2, 9) + '_' + Date.now();
    }

    function formatTimestamp(date) {
      return date.toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true
      });
    }

    function callBridge(method) {
      var args = Array.prototype.slice.call(arguments, 1);
      try {
        if (window.javaBridge && typeof window.javaBridge[method] === 'function') {
          window.javaBridge[method].apply(window.javaBridge, args);
        }
      } catch (e) {
        console.warn('[bridge] ' + method + ' failed:', e);
      }
    }

    function saveNote() {
      if (!activeNodeId) return;

      var text = noteInput.value.trim();
      if (!text) {
        setStatus('Note not saved: content is empty.');
        return;
      }

	  var generalPos = isGeneralNoteId(activeNodeId)
	    ? screenToSvgPoint(noteDialogAnchor.x, noteDialogAnchor.y)
	    : null;

	  var note = {
	    id:          generateId(),
	    componentId: activeNodeId,
	    author:      currentAuthor,
	    timestamp:   formatTimestamp(new Date()),
	    text:        text,
	    isDeleted:   false,
	    x:            generalPos ? generalPos.x : null,
	    y:            generalPos ? generalPos.y : null,
	    replies:     []
	  };

      if (!notesByNode[activeNodeId]) notesByNode[activeNodeId] = [];
      notesByNode[activeNodeId].push(note);

      callBridge('saveNote', JSON.stringify(note));

      setStatus('Saved note for "' + activeNodeId + '" by ' + currentAuthor);
      hideNoteDialog();

      if (lastRenderedGraph) renderGraph(lastRenderedGraph);
      openNotePanel(activeNodeId);
    }

	function submitReply(nodeId, noteIndex, parentReplyId, text) {
	  var notes = notesByNode[nodeId];
	  if (!notes || !notes[noteIndex]) return;

	  var note = notes[noteIndex];

	  var reply = {
	    id: generateId(),
	    author: currentAuthor,
	    timestamp: formatTimestamp(new Date()),
	    text: text,
	    isDeleted: false,
	    replies: []
	  };

	  if (!parentReplyId) {
	    if (!note.replies) note.replies = [];
	    note.replies.push(reply);
	  } else {
	    var parent = findReplyById(note.replies, parentReplyId);
	    if (!parent) return;
	    if (!parent.replies) parent.replies = [];
	    parent.replies.push(reply);
	  }

	  callBridge('saveReply', note.id, parentReplyId || '', JSON.stringify(reply));

	  var panel = openPanelsByNode[nodeId];
	  if (panel) renderNotePanelContent(panel, nodeId, noteIndex);
	}

    function deleteNote(nodeId, noteIndex) {
      var notes = notesByNode[nodeId];
      if (!notes || !notes[noteIndex]) return;
      var note = notes[noteIndex];
      note.isDeleted = true;
      callBridge('deleteNote', note.id);

      var panel = openPanelsByNode[nodeId];
      if (panel) renderNotePanelContent(panel, nodeId, noteIndex);

      // Refresh graph so badge count updates
      if (lastRenderedGraph) renderGraph(lastRenderedGraph);
    }

	function deleteReply(nodeId, noteIndex, replyId) {
	  var notes = notesByNode[nodeId];
	  if (!notes || !notes[noteIndex]) return;

	  var note = notes[noteIndex];
	  var reply = findReplyById(note.replies, replyId);
	  if (!reply) return;

	  if (!sameUser(reply.author, currentAuthor)) {
	    setStatus('Only the reply author can delete this reply.');
	    return;
	  }

	  reply.isDeleted = true;
	  callBridge('deleteReply', note.id, reply.id);

	  var panel = openPanelsByNode[nodeId];
	  if (panel) renderNotePanelContent(panel, nodeId, noteIndex);

	  if (lastRenderedGraph) renderGraph(lastRenderedGraph);
	}
	
	function persistGeneralNotePosition(nodeId, x, y) {
	  if (!isGeneralNoteId(nodeId)) return;

	  var notes = notesByNode[nodeId];
	  if (!notes) return;

	  notes.forEach(function(note) {
	    note.x = x;
	    note.y = y;
	    callBridge('saveNote', JSON.stringify(note));
	  });
	}

    // Phase 5: called by Java on diagram open with the persisted notes array
	function loadNotes(data) {
	  // Always refresh the JS note cache from Java persistence.
	  Object.keys(notesByNode).forEach(function(key) {
	    delete notesByNode[key];
	  });

	  if (!data || !Array.isArray(data)) {
	    if (lastRenderedGraph) {
	      renderGraph(lastRenderedGraph);
	    }
	    return;
	  }

	  data.forEach(function(note) {
	    if (!note || !note.componentId) return;

	    if (!notesByNode[note.componentId]) {
	      notesByNode[note.componentId] = [];
	    }

	    notesByNode[note.componentId].push(note);
	  });

	  if (lastRenderedGraph) {
	    renderGraph(lastRenderedGraph);
	  }

	  Object.keys(openPanelsByNode).forEach(function(nodeId) {
	    var panel = openPanelsByNode[nodeId];
	    if (panel) {
	      var idx = parseInt(panel.dataset.noteIndex) || 0;
	      renderNotePanelContent(panel, nodeId, idx);
	    }
	  });
	}
	
	function loadPositions(data) {
	  Object.keys(savedPositionsByNode).forEach(function(key) {
	    delete savedPositionsByNode[key];
	  });

	  if (!data || typeof data !== "object") {
	    if (lastRenderedGraph) renderGraph(lastRenderedGraph);
	    return;
	  }

	  Object.keys(data).forEach(function(id) {
	    savedPositionsByNode[id] = data[id];
	  });

	  if (lastRenderedGraph) renderGraph(lastRenderedGraph);
	}

        function(el) { el.style.display = 'block'; });

	function findReplyById(replies, replyId) {
	  if (!replies || !replyId) return null;

	  for (var i = 0; i < replies.length; i++) {
	    var reply = replies[i];

	    if (reply.id === replyId) {
	      return reply;
	    }

	    var nested = findReplyById(reply.replies, replyId);
	    if (nested) return nested;
	  }

	  return null;
	}

	function hasActiveReplies(replies) {
	  if (!replies) return false;

	  for (var i = 0; i < replies.length; i++) {
	    var reply = replies[i];

	    if (!reply.isDeleted) {
	      return true;
	    }

	    if (hasActiveReplies(reply.replies)) {
	      return true;
	    }
	  }

	  return false;
	}

	function renderRepliesHtml(replies, depth) {
	  if (!replies || replies.length === 0) return '';

	  var html = '';

	  replies.forEach(function(reply) {
		var canDelete = !reply.isDeleted &&
		                sameUser(reply.author, currentAuthor);

	    html += '<div class="reply-row" style="margin-left:' + (depth * 18) + 'px;">';

	    if (reply.isDeleted) {
	      html += '<div class="reply-deleted">[deleted]</div>';
	    } else {
	      html +=
	        '<div class="reply-meta"><strong>' + escapeHtml(reply.author) + '</strong> &middot; ' +
	        escapeHtml(reply.timestamp) + '</div>' +
	        '<div>' + escapeHtml(reply.text) + '</div>' +
	        '<button class="note-reply-btn reply-to-reply-btn" data-reply-id="' + reply.id + '" type="button">Reply</button>' +
	        (canDelete ? '<button class="reply-delete-btn" data-reply-id="' + reply.id + '" type="button">Delete</button>' : '') +
	        '<div class="reply-input-area nested-reply-area" id="reply_area_' + reply.id + '" style="display:none;">' +
	          '<textarea class="reply-textarea" placeholder="Write a reply..."></textarea>' +
	          '<div style="display:flex;gap:6px;margin-top:6px;">' +
	            '<button class="noteBtn noteBtnSave nested-reply-send-btn" data-reply-id="' + reply.id + '" type="button">Send</button>' +
	            '<button class="noteBtn noteBtnCancel nested-reply-cancel-btn" data-reply-id="' + reply.id + '" type="button">✕</button>' +
	          '</div>' +
	        '</div>';
	    }

	    if (reply.replies && reply.replies.length > 0) {
	      html += renderRepliesHtml(reply.replies, depth + 1);
	    }

	    html += '</div>';
	  });

	  return html;
	}
	
    function renderNotePanelContent(panel, nodeId, noteIndex) {
      var notes = notesByNode[nodeId];

      var safeIndex = Math.max(0, Math.min(noteIndex, notes.length - 1));

      var body = panel.querySelector('.floating-note-body');

      // ── Wire Reply button ──────────────────────────────────────

	  // ── Wire direct reply Send / Cancel ─────────────────────────

	    replyArea.querySelector('.reply-send-btn').addEventListener('click', function(e) {
	      e.stopPropagation();

	      e.stopPropagation();

      // ── Wire Delete note ──────────────────────────────────────
      var delNoteBtn = body.querySelector('.note-delete-btn');
      if (delNoteBtn) {
        delNoteBtn.addEventListener('click', function(e) { e.stopPropagation(); deleteNote(nodeId, safeIndex); });

	  // ── Wire Delete reply buttons ──────────────────────────────
	  body.querySelectorAll('.reply-delete-btn').forEach(function(btn) {
	    btn.addEventListener('click', function(e) {
	      e.stopPropagation();

	  // ── Wire Reply-to-reply buttons ────────────────────────────
	  body.querySelectorAll('.reply-to-reply-btn').forEach(function(btn) {
	    btn.addEventListener('click', function(e) {

	      var replyId = btn.dataset.replyId;

	      if (area) {
	        area.style.display = area.style.display === 'none' ? 'block' : 'none';
	        if (area.style.display === 'block') {
	          area.querySelector('.reply-textarea').focus();
	        }

	  });

	  // ── Wire nested reply Send buttons ─────────────────────────
	  body.querySelectorAll('.nested-reply-send-btn').forEach(function(btn) {
	    btn.addEventListener('click', function(e) {
	      e.stopPropagation();

	      var replyId = btn.dataset.replyId;
	      var area = document.getElementById('reply_area_' + replyId);
	      if (!area) return;

	      var txt = area.querySelector('.reply-textarea').value.trim();
	      if (!txt) return;

	      area.querySelector('.reply-textarea').value = '';
	      area.style.display = 'none';

	      submitReply(nodeId, safeIndex, replyId, txt);

	  // ── Wire nested reply Cancel buttons ───────────────────────
	  body.querySelectorAll('.nested-reply-cancel-btn').forEach(function(btn) {
	    btn.addEventListener('click', function(e) {
	      e.stopPropagation();

	      var replyId = btn.dataset.replyId;

	      if (!area) return;

	      area.querySelector('.reply-textarea').value = '';
	      area.style.display = 'none';

    }

	function openNotePanel(nodeId) {
	  const notes = notesByNode[nodeId];
	  if (!notes || notes.length === 0) return;

	  if (openPanelsByNode[nodeId]) {
	    openPanelsByNode[nodeId].style.display = "block";
	    bringPanelToFront(openPanelsByNode[nodeId]);
	    renderNotePanelContent(openPanelsByNode[nodeId], nodeId, notes.length - 1);
	    return;
	  }

	  const panel = document.createElement("div");
	  panel.className = "floating-note-panel";
	  panel.dataset.nodeId = nodeId;
	  panel.dataset.noteIndex = String(notes.length - 1);

	  const startPos = getDefaultPanelPosition(nodeId);
	  panel.style.left = startPos.x + "px";
	  panel.style.top = startPos.y + "px";

	  const header = document.createElement("div");
	  header.className = "floating-note-header";
	  header.innerHTML = `
	    <span>Note: ${escapeHtml(displayNameForComponent(nodeId))}</span>
	    <button class="floating-note-close" type="button">&times;</button>
	  `;

	  const body = document.createElement("div");
	  body.className = "floating-note-body";

	  panel.appendChild(header);
	  panel.appendChild(body);
	  document.getElementById("canvas").appendChild(panel);

	  renderNotePanelContent(panel, nodeId, notes.length - 1);

	  openPanelsByNode[nodeId] = panel;
	  bringPanelToFront(panel);

	  const closeBtn = header.querySelector(".floating-note-close");
	  closeBtn.addEventListener("click", function(event) {
	    event.stopPropagation();
	    panel.style.display = "none";
	  });

	  makePanelDraggable(panel, header, nodeId);

	  panel.addEventListener("mousedown", function() {
	    bringPanelToFront(panel);
	  });
	}

    function bringPanelToFront(panel) {
      const panels = document.querySelectorAll(".floating-note-panel");
      let maxZ = 2600;
      panels.forEach(function(p) {
        const z = parseInt(window.getComputedStyle(p).zIndex || "2600", 10);
        if (z > maxZ) maxZ = z;
      });
      panel.style.zIndex = String(maxZ + 1);
    }

    function makePanelDraggable(panel, handle, nodeId) {
      let isDragging = false;
      let offsetX = 0;
      let offsetY = 0;

      handle.addEventListener("mousedown", function(event) {
        if (event.button !== 0) return;
        isDragging = true;
        offsetX = event.clientX - panel.offsetLeft;
        offsetY = event.clientY - panel.offsetTop;
        bringPanelToFront(panel);
        event.preventDefault();
        event.stopPropagation();
      });

      document.addEventListener("mousemove", function(event) {
        if (!isDragging) return;

        const canvas = document.getElementById("canvas");
        const rect = canvas.getBoundingClientRect();

        let newX = event.clientX - rect.left - offsetX;
        let newY = event.clientY - rect.top - offsetY;

        newX = Math.max(0, newX);
        newY = Math.max(0, newY);

        panel.style.left = newX + "px";
        panel.style.top = newY + "px";

        panelPositionsByNode[nodeId] = { x: newX, y: newY };
      });

      document.addEventListener("mouseup", function() {
        isDragging = false;
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

	function sameUser(a, b) {

    function estimateNodeHeight(lines) {
      const titleHeight = 28;
      const paddingTop = 16;
      const paddingBottom = 16;
      const dividerGap = 14;
      const lineHeight = 16;
      return paddingTop + titleHeight + dividerGap + (lines.length * lineHeight) + paddingBottom;
    }
	
	function truncateText(text, maxChars) {
	  if (!text) return "";
	  return text.length > maxChars ? text.substring(0, maxChars - 3) + "..." : text;
	}

    function applyEdgeStyle(kind, line) {
      line.removeAttribute('stroke-dasharray');
      line.removeAttribute('marker-start');
      line.removeAttribute('marker-end');

      switch (kind) {
        case 'EXTENDS':
          line.setAttribute('stroke', '#3b4252');
          line.setAttribute('marker-end', 'url(#arrow-open)');
          break;

        case 'IMPLEMENTS':
          line.setAttribute('stroke', '#3b4252');
          line.setAttribute('stroke-dasharray', '8 5');
          line.setAttribute('marker-end', 'url(#arrow-open)');
          break;

        case 'USES':
          line.setAttribute('stroke', '#586070');
          line.setAttribute('stroke-dasharray', '4 4');
          line.setAttribute('marker-end', 'url(#arrow-solid)');
          break;

		case 'DIRECTED_ASSOCIATION':
		  line.setAttribute('stroke', '#586070');
		  line.setAttribute('marker-end', 'url(#arrow-open)');
		  break;
	
		case 'ASSOCIATES':
		  line.setAttribute('stroke', '#586070');
		  break;
	
		case 'AGGREGATES':
		  line.setAttribute('stroke', '#586070');
		  line.setAttribute('marker-start', 'url(#diamond-hollow)');
		  break;
	
		case 'COMPOSES':
		  line.setAttribute('stroke', '#586070');
		  line.setAttribute('marker-start', 'url(#diamond-solid)');
		  break;

        default:
          line.setAttribute('stroke', '#586070');
          line.setAttribute('marker-end', 'url(#arrow-solid)');
          break;
      }
    }

    function prettyKindLabel(kind) {
      switch (kind) {
        case 'EXTENDS': return 'extends';
        case 'IMPLEMENTS': return 'implements';
        case 'USES': return 'uses';
		case 'DIRECTED_ASSOCIATION': return 'directed';
        case 'ASSOCIATES': return 'associates';
        case 'AGGREGATES': return 'aggregates';
        case 'COMPOSES': return 'composes';
        default: return kind.toLowerCase();
      }
    }

    function getBoundaryPoint(node, dx, dy) {
      const cx = node.x + node.width / 2;
      const cy = node.y + node.height / 2;

      const halfW = node.width / 2;
      const halfH = node.height / 2;

      if (dx === 0 && dy === 0) {
        return { x: cx, y: cy };
      }

      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);

      let scale;
      if (absDx / halfW > absDy / halfH) {
        scale = halfW / absDx;
      } else {
        scale = halfH / absDy;
      }

      return {
        x: cx + dx * scale,
        y: cy + dy * scale
      };
    }
	
	function renderAssociationNoteBadges(nodes) {
	  const viewport = document.getElementById('viewport');

	  // remove old association badges before redrawing
	  viewport.querySelectorAll('.association-note-badge-group').forEach(function(el) {
	    el.remove();
	  });

	  Object.keys(notesByNode).forEach(function(edgeId) {
	    if (!isEdgeNoteId(edgeId)) return;

	    var activeNotes = notesByNode[edgeId].filter(function(n) {
	      return !n.isDeleted;
	    });

	    if (activeNotes.length === 0) return;

	    var edgeEl = Array.from(viewport.querySelectorAll('.edge-line')).find(function(el) {
	      return el.getAttribute('data-id') === edgeId;
	    });
	    if (!edgeEl) return;

	    var x1 = parseFloat(edgeEl.getAttribute('x1'));
	    var y1 = parseFloat(edgeEl.getAttribute('y1'));
	    var x2 = parseFloat(edgeEl.getAttribute('x2'));
	    var y2 = parseFloat(edgeEl.getAttribute('y2'));

	    var midX = (x1 + x2) / 2;
	    var midY = (y1 + y2) / 2;

	    var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
	    g.setAttribute('class', 'association-note-badge-group');
	    g.setAttribute('data-id', edgeId);

	    var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
	    circle.setAttribute('class', 'association-note-badge');
	    circle.setAttribute('cx', midX + 10);
	    circle.setAttribute('cy', midY - 10);
	    circle.setAttribute('r', 12);

	    var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
	    text.setAttribute('class', 'association-note-badge-text');
	    text.setAttribute('x', midX + 10);
	    text.setAttribute('y', midY - 10);
	    text.textContent = String(activeNotes.length);

	    g.appendChild(circle);
	    g.appendChild(text);

	    g.addEventListener('click', function(e) {
	      e.stopPropagation();
	      openNotePanel(edgeId);
	    });

	    viewport.appendChild(g);

	    nodeAnchors[edgeId] = {
	      x: midX + 24,
	      y: midY - 10
	    };
	  });
	}

    function getNodeStyle(node) {
      if (node.kind === 'ENUM') {
        return { stereotype: '\u00ABenumeration\u00BB', headerColor: '#4A2E6B', textColor: '#FFFFFF', italic: false };
      }
      if (node.kind === 'INTERFACE') {
        return { stereotype: '\u00ABinterface\u00BB', headerColor: '#87CEEB', textColor: '#1A1A2E', italic: true };
      }
      if (node.kind === 'CLASS' && node.isAbstract) {
        return { stereotype: '{abstract}', headerColor: '#FFDAB9', textColor: '#3A2A0A', italic: true };
      }
      return { stereotype: null, headerColor: '#E8E4F0', textColor: '#2A2040', italic: false };
    }

    function renderGraph(graph) {
      try {
        lastRenderedGraph = graph;

        const svg = document.getElementById('svg');
        const viewport = document.getElementById('viewport');
        viewport.innerHTML = '';

        Object.values(openPanelsByNode).forEach(function(panel) {
          if (panel && panel.parentNode) {
            panel.parentNode.removeChild(panel);
          }
        });
        for (const key in openPanelsByNode) {
          delete openPanelsByNode[key];
        }

        const nodes = {};
		const defaultWidth = 280;
		const expandedWidth = 280;
        const cols = 4;
		
		const expandedNodes = window.expandedNodes || {};
		window.expandedNodes = expandedNodes;

		graph.nodes.forEach(function(n, i) {
		  const memberLines = n.members ? n.members.split('\n').filter(x => x.trim().length > 0) : [];

		  const savedPosition = savedPositionsByNode[n.id];
		  const x = savedPosition ? savedPosition.x : 100 + (i % cols) * 620;
		  const y = savedPosition ? savedPosition.y : 60 + Math.floor(i / cols) * 170;

		  const height = estimateNodeHeight(memberLines);

          nodes[n.id] = {
            x: x,
            y: y,
			width: expandedNodes[n.id] ? expandedWidth : defaultWidth,
            height: height,
            data: n,
            memberLines: memberLines
          };

		  nodeAnchors[n.id] = { x: x + nodes[n.id].width + 8, y: y + 12 };
        });

        graph.edges.forEach(function(e) {
          if (!nodes[e.source] || !nodes[e.target]) return;

		  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
		  line.setAttribute('class', 'edge edge-line');
		  line.setAttribute('data-id', e.id);
		  line.setAttribute('data-source', e.source);
		  line.setAttribute('data-target', e.target);
		  line.setAttribute('data-kind', e.kind);

		  applyEdgeStyle(e.kind, line);

		  const hit = document.createElementNS('http://www.w3.org/2000/svg', 'line');
		  hit.setAttribute('class', 'edge-hitbox');
		  hit.setAttribute('data-id', e.id);
		  hit.setAttribute('data-source', e.source);
		  hit.setAttribute('data-target', e.target);
		  hit.setAttribute('data-kind', e.kind);

		  viewport.appendChild(hit);
		  viewport.appendChild(line);

          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('class', 'edge-label');
		  label.setAttribute('data-edge-label', e.id);
          label.textContent = prettyKindLabel(e.kind);
          viewport.appendChild(label);
        });

        Object.keys(nodes).forEach(function(id) {
          const n = nodes[id];

          const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          g.setAttribute('class', 'node');
          g.setAttribute('data-id', id);
          g.setAttribute('transform', 'translate(' + n.x + ',' + n.y + ')');

          const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          shadow.setAttribute('class', 'node-shadow');
          shadow.setAttribute('x', 4);
          shadow.setAttribute('y', 5);
          shadow.setAttribute('width', n.width);
          shadow.setAttribute('height', n.height);
          g.appendChild(shadow);

          const body = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          body.setAttribute('class', 'node-body');
          body.setAttribute('width', n.width);
          body.setAttribute('height', n.height);
          g.appendChild(body);

          const nodeStyle = getNodeStyle(n.data);

          const header = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          header.setAttribute('class', 'node-header');
          header.setAttribute('width', n.width);
          header.setAttribute('height', 42);
          header.style.fill = nodeStyle.headerColor;
          if (n.data.isAbstract) body.style.strokeDasharray = '5,3';
          g.appendChild(header);

          if (nodeStyle.stereotype) {
            const stereo = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            stereo.setAttribute('x', 14);
            stereo.setAttribute('y', 14);
            stereo.style.fontSize = '10px';
            stereo.style.fill = nodeStyle.textColor;
            stereo.style.fontStyle = 'italic';
            stereo.textContent = nodeStyle.stereotype;
            g.appendChild(stereo);
          }

          const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          title.setAttribute('class', 'node-title');
          title.setAttribute('x', 14);
          title.setAttribute('y', nodeStyle.stereotype ? 30 : 27);
          title.style.fill = nodeStyle.textColor;
          if (nodeStyle.italic) title.style.fontStyle = 'italic';
		  title.textContent = expandedNodes[id] ? n.data.label : truncateText(n.data.label, 26);
          g.appendChild(title);

          const divider = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          divider.setAttribute('class', 'node-divider');
          divider.setAttribute('x1', 0);
          divider.setAttribute('x2', n.width);
          divider.setAttribute('y1', 42);
          divider.setAttribute('y2', 42);
          g.appendChild(divider);

          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('class', 'node-text');
          text.setAttribute('x', 14);
          text.setAttribute('y', 60);

          n.memberLines.forEach(function(lineText, idx) {
            const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
            tspan.setAttribute('x', 14);
            tspan.setAttribute('dy', idx === 0 ? 0 : 16);
			tspan.textContent = expandedNodes[id] ? truncateText(lineText, 72) : truncateText(lineText, 42);
            text.appendChild(tspan);
          });

          g.appendChild(text);

          var activeNotes = notesByNode[id] ? notesByNode[id].filter(function(n) { return !n.isDeleted; }) : [];
          if (activeNotes.length > 0) {
            var badge = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            badge.setAttribute('class', 'note-badge');
            badge.setAttribute('cx', n.width - 16);
            badge.setAttribute('cy', 16);
            badge.setAttribute('r', 12);
            badge.addEventListener('click', (function(capturedId) {
              return function(event) { event.stopPropagation(); openNotePanel(capturedId); };
            })(id));
            g.appendChild(badge);

            var badgeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            badgeText.setAttribute('class', 'note-badge-text');
            badgeText.setAttribute('x', n.width - 16);
            badgeText.setAttribute('y', 16);
            badgeText.textContent = String(activeNotes.length);

            badgeText.addEventListener('click', (function(capturedId) 
            {
              return function(event) 
              {
                event.stopPropagation();
                openNotePanel(capturedId);
              };
            })(id));
            g.appendChild(badgeText);
          }

          viewport.appendChild(g);
        });

        function updateEdges() {
		  const edgeEls = viewport.querySelectorAll('.edge-line, .edge-hitbox');
          edgeEls.forEach(function(edge) {
            const s = nodes[edge.getAttribute('data-source')];
            const t = nodes[edge.getAttribute('data-target')];
            if (!s || !t) return;

            const sx = s.x + s.width / 2;
            const sy = s.y + s.height / 2;
            const tx = t.x + t.width / 2;
            const ty = t.y + t.height / 2;

            const dx = tx - sx;
            const dy = ty - sy;

            const sourcePoint = getBoundaryPoint(s, dx, dy);
            const targetPoint = getBoundaryPoint(t, -dx, -dy);

            edge.setAttribute('x1', sourcePoint.x);
            edge.setAttribute('y1', sourcePoint.y);
            edge.setAttribute('x2', targetPoint.x);
            edge.setAttribute('y2', targetPoint.y);

			const label = viewport.querySelector('[data-edge-label="' + edge.getAttribute('data-id') + '"]');
            if (label) {
              const midX = (sourcePoint.x + targetPoint.x) / 2;
              const midY = (sourcePoint.y + targetPoint.y) / 2;
              label.setAttribute('x', midX + 6);
              label.setAttribute('y', midY - 6);
            }
          });

          viewport.querySelectorAll('.node').forEach(function(nodeEl) {
            const id = nodeEl.getAttribute('data-id');
            const n = nodes[id];
            nodeEl.setAttribute('transform', 'translate(' + n.x + ',' + n.y + ')');
            nodeAnchors[id] = { x: n.x + n.width + 8, y: n.y + 12 };
          });
		  
		  renderAssociationNoteBadges(nodes);
        }

        updateEdges();

		let dragged = null;
		let draggedGeneralNoteId = null;
		let offsetX = 0;
		let offsetY = 0;

		viewport.querySelectorAll('.node').forEach(function(nodeEl) 
    {
		nodeEl.addEventListener('dblclick', function(e) {
		  e.stopPropagation();

		  if (e.target.classList.contains('note-badge') ||
		      e.target.classList.contains('note-badge-text')) {
		    return;
		  }

		  const id = nodeEl.getAttribute('data-id');
		  expandedNodes[id] = !expandedNodes[id];
		  renderGraph(lastRenderedGraph);
		});

		  nodeEl.addEventListener('mousedown', function(e) {
		    if (e.button !== 0) return;
			if (e.target.classList.contains('note-badge') ||
			    e.target.classList.contains('note-badge-text')) return;
		    const id = nodeEl.getAttribute('data-id');
			dragged = nodes[id];
			draggedGeneralNoteId = null;

			var svgPoint = screenToSvgPoint(e.clientX, e.clientY);
			offsetX = svgPoint.x - dragged.x;
			offsetY = svgPoint.y - dragged.y;

			e.stopPropagation();
		  });

		  nodeEl.addEventListener('contextmenu', function(e) {
		    e.preventDefault();
		    e.stopPropagation();
		    const id = nodeEl.getAttribute('data-id');
		    showContextMenu(e.clientX, e.clientY, id);
		  });
		});
		
		viewport.querySelectorAll('.edge-line, .edge-hitbox').forEach(function(edgeEl) {
		  edgeEl.addEventListener('contextmenu', function(e) {
		    e.preventDefault();
		    e.stopPropagation();

		    const edgeId = edgeEl.getAttribute('data-id');
		    showContextMenu(e.clientX, e.clientY, edgeId);
		  });
		});

		document.addEventListener('mousemove', function(e) {
		  if (!dragged) return;

		  var svgPoint = screenToSvgPoint(e.clientX, e.clientY);
		  dragged.x = svgPoint.x - offsetX;
		  dragged.y = svgPoint.y - offsetY;

		  updateEdges();

		  if (dragged && dragged.data && dragged.data.id) {
		    callBridge('savePosition', dragged.data.id, dragged.x, dragged.y);
		  }
		});

		document.addEventListener('mouseup', function() {
		  if (dragged && draggedGeneralNoteId) {
		    persistGeneralNotePosition(draggedGeneralNoteId, dragged.x, dragged.y);
		  }

		  dragged = null;
		  draggedGeneralNoteId = null;
		});

        let pan = { x: 0, y: 0 };
        let isPanning = false;
        let panStart = { x: 0, y: 0 };

        svg.addEventListener('mousedown', function(e) {
          if (e.button !== 0) return;
          if (e.target.closest('.node')) return;
          isPanning = true;
          panStart.x = e.clientX - pan.x;
          panStart.y = e.clientY - pan.y;
        });

        document.addEventListener('mousemove', function(e) {
          if (!isPanning) return;
          pan.x = e.clientX - panStart.x;
          pan.y = e.clientY - panStart.y;
          viewport.dataset.panX = pan.x;
          viewport.dataset.panY = pan.y;
          viewport.setAttribute('transform', 'translate(' + pan.x + ',' + pan.y + ') scale(' + currentZoom + ')');
        });

        document.addEventListener('mouseup', function() {
          isPanning = false;
        });

        viewport.dataset.panX = 0;
        viewport.dataset.panY = 0;
        setZoom(currentZoom);

        // ── Ghosted nodes: components removed from diagram but with notes ──
        var currentIds = {};
        graph.nodes.forEach(function(n) { currentIds[n.id] = true; });
        var ghostX = 100;
        var ghostY = 60 + Math.ceil(graph.nodes.length / cols) * 200 + 60;

		Object.keys(notesByNode).forEach(function(ghostId) {
		  if (currentIds[ghostId]) return; // still in diagram

		  // Do NOT render missing association/edge notes as removed boxes.
		  // If the edge is outside the current package view, hide it.
		  if (isEdgeNoteId(ghostId)) return;

		  var activeGhostNotes = notesByNode[ghostId].filter(function(n) { return !n.isDeleted; });
		  if (activeGhostNotes.length === 0) return;

		  var firstNote = activeGhostNotes[activeGhostNotes.length - 1];

		  for (var i = activeGhostNotes.length - 1; i >= 0; i--) {
		    if (activeGhostNotes[i].x != null && activeGhostNotes[i].y != null) {
		      firstNote = activeGhostNotes[i];
		      break;
		    }
		  }

		  var gw = 280, gh = 80;
		  var finalX = ghostX;
		  var finalY = ghostY;

		  if (isGeneralNoteId(ghostId) && firstNote) {
			finalX = firstNote.x != null ? firstNote.x : ghostX;
			finalY = firstNote.y != null ? firstNote.y : ghostY;
		  }
		  
          var gg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          gg.setAttribute('class', 'node note-ghosted');
          gg.setAttribute('data-id', ghostId);
		  gg.setAttribute('transform', 'translate(' + finalX + ',' + finalY + ')');
          gg.style.opacity = '0.5';

		  nodes[ghostId] = { x: finalX, y: finalY, width: gw, height: gh };
		  nodeAnchors[ghostId] = { x: finalX + gw + 8, y: finalY + 12 };

          var gbody = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          gbody.setAttribute('class', 'node-body');
          gbody.setAttribute('width', gw);
          gbody.setAttribute('height', gh);
          gg.appendChild(gbody);

          var gheader = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          gheader.setAttribute('class', 'node-header');
          gheader.setAttribute('width', gw);
          gheader.setAttribute('height', 42);
          gg.appendChild(gheader);

          var gtitle = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          gtitle.setAttribute('class', 'node-title');
          gtitle.setAttribute('x', 14);
          gtitle.setAttribute('y', 27);
          gtitle.textContent = ghostId + ' (removed)';
          gg.appendChild(gtitle);

          var gbadge = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          gbadge.setAttribute('class', 'note-badge');
          gbadge.setAttribute('cx', gw - 16);
          gbadge.setAttribute('cy', 16);
          gbadge.setAttribute('r', 12);
          gbadge.addEventListener('click', (function(id) {
            return function(ev) { ev.stopPropagation(); openNotePanel(id); };
          })(ghostId));
          gg.appendChild(gbadge);

          var gbadgeTxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          gbadgeTxt.setAttribute('class', 'note-badge-text');
          gbadgeTxt.setAttribute('x', gw - 16);
          gbadgeTxt.setAttribute('y', 16);
          gbadgeTxt.textContent = String(activeGhostNotes.length);

		  if (isGeneralNoteId(ghostId))
          {
			gtitle.textContent = "General Note";
			gtitle.style.fill = "#1f2937";
			gtitle.style.opacity = "1";

			gbody.style.strokeDasharray = "0";
			gbody.style.fill = "#ffffff";
			gbody.style.stroke = "#4aa3df";

			gheader.style.fill = "#bdeaff";
			gheader.style.stroke = "#4aa3df";
			gheader.style.opacity = "1";

			gg.style.opacity = "1";
          }
		  
		  gbadgeTxt.addEventListener('click', (function(id) {
		    return function(ev) {
		      ev.stopPropagation();
		      openNotePanel(id);
		    };
		  })(ghostId));
		  
          gg.appendChild(gbadgeTxt);

		  viewport.appendChild(gg);

		  if (isGeneralNoteId(ghostId)) {
		    gg.addEventListener('mousedown', function(e) {
		      if (e.button !== 0) return;

		      if (e.target.classList.contains('note-badge') ||
		          e.target.classList.contains('note-badge-text')) {
		        return;
		      }

			  var id = this.getAttribute('data-id');
			  dragged = nodes[id];
			  draggedGeneralNoteId = id;

		      var svgPoint = screenToSvgPoint(e.clientX, e.clientY);
		      offsetX = svgPoint.x - dragged.x;
		      offsetY = svgPoint.y - dragged.y;

		      e.preventDefault();
		      e.stopPropagation();
		    });
		  }

		  ghostX += 360;
		  
          if (ghostX > 1500) { ghostX = 100; ghostY += 130; }
        });

        setStatus('Rendered successfully. Drag nodes. Ctrl + wheel zoom.');
      } catch (e) {
        setStatus('Render error: ' + e);
      }
    }

    // ── Ctrl + scroll: zoom ────────────────────────────────────────────────────
    document.addEventListener('wheel', function(e) {
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        var delta = e.deltaY > 0 ? -0.1 : 0.1;
        currentZoom = Math.max(0.4, Math.min(2.5, currentZoom + delta));
        setZoom(currentZoom);
      }
    }, { passive: false });

    // ── Click outside context menu: close it ──────────────────────────────────
    document.addEventListener('mousedown', function(e) {
      var menu = document.getElementById('contextMenu');
      if (menu && menu.style.display === 'block' && !menu.contains(e.target)) {
        hideContextMenu();
      }
    });

    // Export the SVG diagram to a PNG data URL.
    // Called by the Eclipse plugin via browser.execute("exportToPng(true)").
    // Result is delivered asynchronously to window.javaExportComplete(dataUrl).
	
	function drawOpenNotePanelsToCanvas(ctx, canvasW, canvasH) {
	  var svg = document.getElementById('svg');
	  var svgRect = svg.getBoundingClientRect();
	  var scaleX = canvasW / svgRect.width;
	  var scaleY = canvasH / svgRect.height;

	  document.querySelectorAll('.floating-note-panel').forEach(function(panel) {
	    if (panel.style.display === 'none') return;

	    var rect = panel.getBoundingClientRect();
	    var x = (rect.left - svgRect.left) * scaleX;
	    var y = (rect.top - svgRect.top) * scaleY;
	    var w = rect.width * scaleX;
	    var h = rect.height * scaleY;

	    ctx.save();

	    ctx.fillStyle = '#fffef7';
	    ctx.strokeStyle = '#ddd3aa';
	    ctx.lineWidth = 1.5;
		ctx.fillRect(x, y, w, h);
		ctx.strokeRect(x, y, w, h);

	    ctx.fillStyle = '#f1e19a';
		ctx.fillRect(x, y, w, 46 * scaleY);

	    ctx.fillStyle = '#4a4330';
	    ctx.font = 'bold ' + (15 * scaleY) + 'px Arial';
	    var title = panel.querySelector('.floating-note-header span');
	    ctx.fillText(title ? title.innerText : 'Note', x + 14 * scaleX, y + 28 * scaleY);

	    ctx.fillStyle = '#374151';
	    ctx.font = (13 * scaleY) + 'px Arial';

	    var body = panel.querySelector('.floating-note-body');
	    var text = body ? body.innerText : '';
	    var lines = text.split('\n').slice(0, 14);
	    var ty = y + 70 * scaleY;

	    lines.forEach(function(line) {
	      ctx.fillText(line.substring(0, 45), x + 14 * scaleX, ty);
	      ty += 18 * scaleY;
	    });

	    ctx.restore();
	  });
	}
	
	
    function exportToPng(includeNotes) {
      try {
        if (!includeNotes) hideNotes();
        var svg = document.getElementById('svg');
        var vb = svg.viewBox.baseVal;
        var w = vb.width || svg.getBoundingClientRect().width || 1200;
        var h = vb.height || svg.getBoundingClientRect().height || 800;
		var clone = svg.cloneNode(true);

		var style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
		style.textContent = `
		  .node-shadow { fill: rgba(0,0,0,0.10); }
		  .node-body { fill: #fff9cc; stroke: #6c63ff; stroke-width: 2; }
		  .node-header { fill: #ede4ff; stroke: #6c63ff; stroke-width: 2; }
		  .node-title { font-size: 15px; font-weight: 700; fill: #2f2f44; }
		  .node-divider { stroke: #cfc5ff; stroke-width: 1.5; }
		  .node-text { font-size: 12px; fill: #4c5670; }
		  .edge { stroke-width: 2.4; fill: none; }
		  .edge-label { font-size: 11px; fill: #374151; font-weight: 700; }
		  .note-badge { fill: #6c63ff; stroke: #ffffff; stroke-width: 2; }
		  .note-badge-text { fill: white; font-size: 11px; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
		  .association-note-badge { fill: #ffd6dc; stroke: #d7263d; stroke-width: 1.5; }
		  .association-note-badge-text { fill: #d7263d; font-size: 11px; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
		  .edge-hitbox { display: none; }
		`;

		clone.insertBefore(style, clone.firstChild);
		clone.querySelectorAll('.association-note-badge').forEach(function(el) {
		  el.setAttribute('fill', '#ffd6dc');
		  el.setAttribute('stroke', '#d7263d');
		  el.setAttribute('stroke-width', '1.5');
		});

		clone.querySelectorAll('.association-note-badge-text').forEach(function(el) {
		  el.setAttribute('fill', '#d7263d');
		  el.setAttribute('font-size', '11');
		  el.setAttribute('font-weight', '700');
		  el.setAttribute('text-anchor', 'middle');
		  el.setAttribute('dominant-baseline', 'central');
		});

		clone.querySelectorAll('.edge-hitbox').forEach(function(el) {
		  el.remove();
		});

		var data = new XMLSerializer().serializeToString(clone);

		if (!data.includes('xmlns="http://www.w3.org/2000/svg"')) {
		  data = data.replace('<svg ', '<svg xmlns="http://www.w3.org/2000/svg" ');
		}
        var canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#eef1f6';
        ctx.fillRect(0, 0, w, h);
        var img = new Image();
        img.onload = function() {
		  ctx.drawImage(img, 0, 0, w, h);

		  if (includeNotes) {
			drawOpenNotePanelsToCanvas(ctx, w, h);
		  }

		  var dataUrl = canvas.toDataURL('image/png');
          if (!includeNotes) showNotes();
          if (typeof window.javaExportComplete === 'function') {
            window.javaExportComplete(dataUrl);
          }
          URL.revokeObjectURL(this.src);
        };
        img.onerror = function() {
          if (!includeNotes) showNotes();
          if (typeof window.javaExportComplete === 'function') {
            window.javaExportComplete(null);
          }
        };
        var blob = new Blob([data], {type: 'image/svg+xml;charset=utf-8'});
        img.src = URL.createObjectURL(blob);
      } catch(e) {
        if (!includeNotes) showNotes();
        if (typeof window.javaExportComplete === 'function') {
          window.javaExportComplete(null);
        }
        console.error('REJD export error: ' + e);
      }
    }

    // The following code block is lifted directly from source: https://www.w3schools.com/howto/howto_js_draggable.asp
    dragElement(document.getElementById("noteDialog"));

    function dragElement(elmnt) {
      var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
      if (document.getElementById(elmnt.id)) {
        // if present, the header is where you move the DIV from:
        document.getElementById(elmnt.id).onmousedown = dragMouseDown;
      } else {
        // otherwise, move the DIV from anywhere inside the DIV:
        elmnt.onmousedown = dragMouseDown;
      }

      function dragMouseDown(e) {
        e = e || window.event;
        e.preventDefault();
        // get the mouse cursor position at startup:
        pos3 = e.clientX;
        pos4 = e.clientY;
        document.onmouseup = closeDragElement;
        // call a function whenever the cursor moves:
        document.onmousemove = elementDrag;
      }

      function elementDrag(e) {
        e = e || window.event;
        e.preventDefault();
        // calculate the new cursor position:
        pos1 = pos3 - e.clientX;
        pos2 = pos4 - e.clientY;
        pos3 = e.clientX;
        pos4 = e.clientY;
        // set the element's new position:
        elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
        elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
      }

      function closeDragElement() {
        // stop moving when mouse button is released:
        document.onmouseup = null;
        document.onmousemove = null;
      }
    }

    // General notes
    const canvas = document.getElementById('canvas');

	canvas.addEventListener('contextmenu', function(e) {
	  if (e.target.closest('.node') ||
	      e.target.closest('.edge-line') ||
	      e.target.closest('.edge-hitbox')) {
	    return;
	  }

	  e.preventDefault();
	  e.stopPropagation();
	  showContextMenu(e.clientX, e.clientY, createGeneralNoteId());
	});
    

  </script>
